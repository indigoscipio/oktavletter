<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Algernon is a private app for writing letters to your future self." />
    <title>Algernon — Write today. Meet yourself tomorrow.</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, 'Times New Roman', serif;
        background: #f2ede4;
        color: #1a1f2e;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 640px;
      }

      p {
        color: #5f6475;
        font-size: 1.15rem;
        line-height: 1.7;
      }

      a {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 18px;
        border: 1px solid #c9922a;
        border-radius: 999px;
        color: #1a1f2e;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Algernon</p>
      <h1>Write today. Meet yourself tomorrow.</h1>
      <p>
        A private place to write letters to your future self. Seal a letter, choose a date,
        and return when the time comes. No accounts. No servers. Your letters stay on your device.
      </p>
      <a href="/app/">Enter Algernon</a>
    </main>
  </body>
</html>
